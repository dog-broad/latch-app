# pnpm 11+ moved package-level settings here. Not a workspace — single-package
# repo. Postinstall scripts run only for explicitly-allowed packages; anything
# new added to the dep tree gets blocked until reviewed.
allowBuilds:
  '@firebase/util': true
  esbuild: true
  protobufjs: true
  # re2 is an optional native regex backend in firebase-tools — js regex
  # fallback is fine. native compile would force a c++ toolchain on
  # everyone who clones the repo. opt out.
  re2: false
